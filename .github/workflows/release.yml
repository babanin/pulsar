name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos-arm64:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build pulsar (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create arm64 distribution
        run: |
          mkdir -p dist/pulsar/bundled/macos-aarch64
          cp target/aarch64-apple-darwin/release/pulsar dist/pulsar/pulsar
          chmod +x dist/pulsar/pulsar

      - name: Install openvpn (arm64)
        run: |
          brew install openvpn || true

      - name: Download ck-client (arm64)
        env:
          CK_VERSION: "v2.7.0"
        run: |
          curl -L -o /tmp/ck-client \
            "https://github.com/cbeuw/Cloak/releases/download/${CK_VERSION}/ck-client-darwin-arm64-${CK_VERSION}" \
            || true
          if [ -f /tmp/ck-client ] && file /tmp/ck-client | grep -q "Mach-O"; then
            chmod +x /tmp/ck-client
            cp /tmp/ck-client dist/pulsar/bundled/macos-aarch64/ck-client
          else
            cp bundled/macos-aarch64/ck-client dist/pulsar/bundled/macos-aarch64/ck-client
          fi

      - name: Bundle openvpn (arm64)
        run: |
          if command -v openvpn &>/dev/null; then
            cp "$(which openvpn)" dist/pulsar/bundled/macos-aarch64/openvpn
          else
            cp bundled/macos-aarch64/openvpn dist/pulsar/bundled/macos-aarch64/openvpn
          fi

      - name: Verify distribution
        run: |
          ls -la dist/pulsar/bundled/macos-aarch64/
          file dist/pulsar/pulsar dist/pulsar/bundled/macos-aarch64/*

      - name: Create archive
        run: cd dist && tar czf pulsar-macos-aarch64.tar.gz pulsar/

      - name: Build macOS installer (.pkg)
        run: |
          pkgbuild \
            --root dist/pulsar \
            --install-location /opt/pulsar \
            --identifier com.babanin.pulsar \
            --version "${GITHUB_REF_NAME#v}" \
            --scripts installer/macos/scripts \
            "dist/pulsar-${GITHUB_REF_NAME}-macos-aarch64.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-macos-aarch64
          path: |
            dist/pulsar-macos-aarch64.tar.gz
            dist/pulsar-*.pkg

  release:
    needs: [build-macos-arm64]
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.pkg
            scripts/install.sh
          generate_release_notes: true
