name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: macos-aarch64
          - target: x86_64-apple-darwin
            platform: macos-x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build pulsar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create distribution directory
        run: |
          mkdir -p dist/pulsar/bundled/${{ matrix.platform }}
          cp target/${{ matrix.target }}/release/pulsar dist/pulsar/
          chmod +x dist/pulsar/pulsar

      - name: Download ck-client
        env:
          CK_VERSION: "v2.7.0"
        run: |
          curl -L -o /tmp/ck-client.gz \
            "https://github.com/cbeuw/Cloak/releases/download/${CK_VERSION}/ck-client-darwin-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'amd64' }}.gz" \
            || echo "ck-client download failed, using stub"
          if [ -f /tmp/ck-client.gz ]; then
            gunzip -f /tmp/ck-client.gz
            chmod +x /tmp/ck-client
            cp /tmp/ck-client dist/pulsar/bundled/${{ matrix.platform }}/ck-client
          else
            cp bundled/${{ matrix.platform }}/ck-client dist/pulsar/bundled/${{ matrix.platform }}/ck-client
          fi

      - name: Download openvpn
        run: |
          curl -L -o /tmp/openvpn.zip \
            "https://swupdate.openvpn.org/community/releases/OpenVPN-${{ matrix.target == 'aarch64-apple-darwin' && 'arm64' || 'x86_64' }}-macOS.zip" \
            || echo "openvpn download failed, using stub"
          if [ -f /tmp/openvpn.zip ]; then
            cd /tmp && unzip -o openvpn.zip && cd -
            if [ -f /tmp/openvpn ]; then
              chmod +x /tmp/openvpn
              cp /tmp/openvpn dist/pulsar/bundled/${{ matrix.platform }}/openvpn
            else
              cp bundled/${{ matrix.platform }}/openvpn dist/pulsar/bundled/${{ matrix.platform }}/openvpn
            fi
          else
            cp bundled/${{ matrix.platform }}/openvpn dist/pulsar/bundled/${{ matrix.platform }}/openvpn
          fi

      - name: Test bundled binaries are executable
        run: |
          ls -la dist/pulsar/bundled/${{ matrix.platform }}/
          file dist/pulsar/bundled/${{ matrix.platform }}/ck-client || true
          file dist/pulsar/bundled/${{ matrix.platform }}/openvpn || true

      - name: Create archive
        run: |
          cd dist
          tar czf pulsar-${{ matrix.platform }}.tar.gz pulsar/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-${{ matrix.platform }}
          path: dist/pulsar-${{ matrix.platform }}.tar.gz

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true