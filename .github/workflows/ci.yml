name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: cargo check

  fmt:
    name: Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all